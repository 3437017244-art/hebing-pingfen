<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <title>购物与商店评分（合并版）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260719-140100">
  <link rel="stylesheet" href="mobile.css?v=20260719-140100">
</head>
<body>
  <div class="app">
    <!-- 查一查（合并搜索） -->
    <section id="panel-browse" class="panel active">
      <div class="search-hero">
        <div class="toolbar">
          <div class="search-row">
            <button type="button" class="browse-map-icon-btn" id="browse-map-btn" aria-label="地图查看" title="地图查看">
              <svg class="browse-map-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 2.8c-3.4 0-6.2 2.7-6.2 6.1 0 4.6 6.2 12.3 6.2 12.3s6.2-7.7 6.2-12.3c0-3.4-2.8-6.1-6.2-6.1zm0 8.3a2.2 2.2 0 1 1 0-4.4 2.2 2.2 0 0 1 0 4.4z" fill="currentColor"/>
              </svg>
            </button>
            <input type="search" id="unified-search" class="search-input" autocomplete="off" placeholder="搜索已登记内容…">
          </div>
          <div id="unified-suggestions" class="search-suggestions hidden"></div>
        </div>

        <div class="browse-filter-bar">
          <div class="filter-chips browse-category-chips" id="browse-category-chips">
            <button type="button" class="chip active" data-browse-filter="all">全部</button>
            <button type="button" class="chip" data-browse-filter="food">食品</button>
            <button type="button" class="chip" data-browse-filter="instant">速食</button>
            <button type="button" class="chip" data-browse-filter="other">其他</button>
          </div>
          <p class="list-summary" id="browse-summary"></p>
        </div>
      </div>

      <div id="no-data-banner" class="form-banner" hidden>
        当前浏览器里没有找到已登记的数据。
        <span id="sync-fail-hint" hidden>自动同步未成功，请点 <a href="同步.html">云端同步</a> 查看原因。</span>
        <span id="sync-fail-sep" hidden> </span>
        <a href="恢复数据.html">点此恢复或导入数据</a>
        或 <a href="同步.html">云端同步</a>
      </div>
      <div id="sync-setup-banner" class="form-banner form-banner-setup" hidden>
        当前地址还没保存 GitHub 令牌：打开页面会自动拉取合并云端数据，但本机新改动不会自动上传。
        本地 <code>127.0.0.1</code> 与线上网站要各保存一次令牌，之后就会两边自动互相同步。
        <a href="同步.html">点此设置令牌</a>
      </div>
      <div id="sync-status-banner" class="form-banner form-banner-status" hidden></div>

      <div id="browse-results">
        <ul class="item-list" id="unified-list"></ul>
        <p class="empty-hint section-empty" id="unified-empty-hint" hidden>暂无匹配的记录</p>
      </div>

      <p class="empty-hint" id="global-empty-hint" hidden></p>
      <button type="button" class="btn btn-primary search-add-trigger" id="search-add-trigger-btn" hidden>确认添加</button>
    </section>

    <footer class="home-meta" aria-label="站点信息">
      <span class="home-meta-version" id="site-version-line">…</span>
      <span class="home-meta-sep" aria-hidden="true">·</span>
      <a class="home-meta-link" href="同步.html">同步</a>
      <span class="home-meta-sep" aria-hidden="true" hidden>·</span>
      <button type="button" class="home-meta-link home-meta-update" id="check-update-btn" hidden>检查更新</button>
    </footer>
  </div>

  <dialog id="search-add-confirm-dialog" class="dialog dialog-prompt">
    <div class="dialog-header">
      <h2>添加新记录</h2>
      <button type="button" class="dialog-close" id="search-add-confirm-close" aria-label="关闭">&times;</button>
    </div>
    <div class="dialog-body">
      <p id="search-add-confirm-text" class="search-add-confirm-text"></p>
    </div>
    <div class="dialog-actions">
      <button type="button" class="btn btn-secondary" id="search-add-confirm-cancel">取消</button>
      <button type="button" class="btn btn-primary" id="search-add-confirm-ok">确认添加</button>
    </div>
  </dialog>

  <dialog id="app-message-dialog" class="dialog dialog-prompt">
    <div class="dialog-header">
      <h2 id="app-message-dialog-title">提示</h2>
      <button type="button" class="dialog-close" id="app-message-dialog-close" aria-label="关闭">&times;</button>
    </div>
    <div class="dialog-body">
      <p id="app-message-dialog-text" class="dialog-prompt-text"></p>
    </div>
    <div class="dialog-actions dialog-prompt-actions">
      <button type="button" class="btn btn-secondary" id="app-message-dialog-cancel" hidden>取消</button>
      <button type="button" class="btn btn-primary" id="app-message-dialog-ok">确定</button>
    </div>
  </dialog>

  <!-- 详情弹层（商品与商店共用） -->
  <dialog id="detail-dialog" class="dialog">
    <div class="dialog-header">
      <h2 id="dialog-title">详情</h2>
      <button type="button" class="dialog-close" id="dialog-close" aria-label="关闭">&times;</button>
    </div>
    <div class="dialog-body" id="dialog-body"></div>
    <div class="dialog-actions">
      <button type="button" class="btn btn-danger" id="dialog-delete-btn">删除</button>
      <button type="button" class="btn btn-primary" id="dialog-edit-btn">编辑</button>
    </div>
  </dialog>

  <script src="site-config.js?v=20260719-140100"></script>
  <script src="mobile-bridge.js?v=20260719-140100"></script>
  <script src="app-update.js?v=20260719-140100"></script>
  <script src="sync-service.js?v=20260719-140100"></script>
  <script src="amap-picker.js?v=20260719-140100"></script>
  <script src="app.js?v=20260719-140100"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const versionLine = document.getElementById('site-version-line');
      if (versionLine && window.HEBING_SITE) {
        const versionText = window.AppUpdate?.formatVersionLine
          ? AppUpdate.formatVersionLine(HEBING_SITE)
          : 'v' + HEBING_SITE.version;
        versionLine.textContent = versionText;
        versionLine.title = [
          window.MobileAppBridge?.isNativeApp?.() ? 'APP 在线版' : '在线版',
          HEBING_SITE.buildId ? '构建 ' + HEBING_SITE.buildId : '',
        ].filter(Boolean).join(' · ');
      }

      const updateBtn = document.getElementById('check-update-btn');
      if (updateBtn) {
        updateBtn.addEventListener('click', async function () {
          if (!window.AppUpdate?.checkUpdateForUser) {
            alert('更新模块未加载');
            return;
          }
          updateBtn.disabled = true;
          updateBtn.textContent = '检查中…';
          try {
            const result = await AppUpdate.checkUpdateForUser();
            if (!result.willReload) {
              alert(result.message);
            }
          } catch (err) {
            alert('检查更新失败：' + (err && err.message ? err.message : err));
          } finally {
            updateBtn.disabled = false;
            updateBtn.textContent = '检查更新';
          }
        });
      }
    });
  </script>
</body>
</html>
